body:
  text: 草堂詩話卷下宋蔡夢弼撰三山老人語録曰子美送嚴武還朝詩云公若登台輔臨危莫愛身是勸以仗節死義也橫浦張子韶心傳録曰讀子美野色更無山隔斷山光直與水相通已而嘆曰子美此詩非特為山光野色凡悟一道理透徹處往往境界皆如此也東萊吕居仁曰詩每句中須有一兩字響響字乃妙指如子美身輕一鳥過輕燕受風斜過字受字皆一句響字也丹陽洪景盧容齋隨筆曰張文潛暮年在宛丘何大圭方弱冠往謁之凡三日見其吟哦老杜玉華宫詩不絶口大圭請其故曰此章乃風雅鼓吹未易為子言大圭曰先生所賦何必減此曰平生極力模寫僅有一篇稍似之然未可同日語也遂誦其離黃州詩偶同此韻曰扁舟發孤城揮手謝送者山回地勢卷天豁江面㵼中流望赤壁石腳插水下昏昏煙霧嶺歷歷漁樵舍居夷實三載鄰里通借假别之豈無情老淚為一灑篙工起鳴鼓輕櫓健於馬聊為過江宿寂歷樊山夜此其音響節奏固似之矣讀之可默喻也橫浦張子韶心傳録曰陶淵明辭云雲無心而出岫鳥倦飛而知還杜子美云水流心不競雲在意俱遲若淵明與子美相易其語則識者往往以謂子美不及淵明矣觀其云雲無心鳥倦飛則可知其本意至於水流而心不競雲在而意俱遲則與物初無間斷氣更混淪難輕議也丹陽洪景盧容齋隨筆曰江山登臨之美泉石賞玩之勝世間佳境也觀者必曰如畫至於丹青之妙好事君子嗟嘆之不足者則又以逼真目之如老杜人間又見真乘黃時危安得真致此悄然坐我天姥下斯須九重真龍出憑軒忽若無丹青髙堂見生鶻直訝松杉冷兼疑菱荇香之句是也以真為假以假為真均之為妄境耳人生萬事如是何特此耶山谷黃魯直詩話曰陶淵明責子詩云白髮被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒已二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓梨與栗天運茍如此且進杯中物觀淵明此詩想見其人慈祥戲謔可觀也俗人便謂淵明諸子皆不肖而淵明愁嘆見於詩耳又云杜子美詩云陶潛避俗翁未必能逹道觀其著詩篇頗亦恨枯稿逹生豈是足默識蓋不早生子賢與愚何其挂懷抱子美困頓於三川蓋為不知者詬病以為拙於生事又往往譏議宗文宗武失學故聊解嘲耳其詩名曰遣興可解也俗人便謂譏議淵明所謂癡人前不得説夢也東坡蘇子瞻詩話曰僕嘗夢見人云是杜子美謂僕曰世人多誤會豫八陳圖詩江流石不轉遺恨失吞吳世人皆以為先主武侯皆欲與關侯復仇故恨不能滅吳非也我意本謂吳蜀唇齒之國不當相圖晉之所以能取蜀者以蜀有吞吳之意此為恨耳王彥輔麈史曰子美善用故事及常語多倒其句而用之蓋如此則語峻而體健如露從今夜白月是故鄉明之類是也建安嚴有翼藝苑雌黃曰劉夢得詩云朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家朱雀橋烏衣巷烏衣謂鐵衣也皆金陵故事輿地志晉時王導自立烏衣宅宋時諸謝曰烏衣之聚皆此巷也王氏謝氏乃江左衣冠之盛者故杜甫詩云王謝風流逺又云從來王謝郎是也比觀劉斧托遺小説又曰王榭金陵人世以航海為業一日海中失船泛一朩登岸見一翁一嫗皆衣皂引榭至所居乃烏衣國也以女妻之既久榭思歸復乘雲軒泛海至其家有二燕棲於梁上榭以手招之即飛來臂上取片紙書小詩繫於燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風幾日回來春燕又飛來榭身上有詩云昔日相逢冥數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗竟不至因目榭所居為烏衣巷劉斧乃改謝為榭以王榭為一人姓名其言既怪誕遂托名於錢希白終篇又取劉夢得詩以實其事希白不應如此之謬是直劉斧之妄言耳不足信也鳯臺王彥輔麈史曰古之善賦詩者工於用人語渾然若出於巳意豫於李杜見之顔延年赭白馬賦曰旦刷幽燕晝秣荆楚子美驄馬行曰晝洗須騰涇渭深夕趨可刷幽并夜太白天馬歌曰雞鳴刷燕暮秣越蓋皆用顔賦也韓退之曰李杜文章在光熖萬丈長信哉鳯臺王彥輔麈史曰世言子美卒於耒陽故寰宇記亦載其墳在縣北二里不知何緣得此新唐書乃稱耒陽令遺白酒黃牛一夕而卒此承襲傳聞而未嘗核實故也得臣觀子美僑寄巴峽三嵗大厯三年二月始下峽流寓荆南徙泊公安久之方次嶽陽即四年冬末也既過洞庭入長沙乃五年之春四月遇臧玠之亂倉皇往衡陽抵耒陽舟中伏枕又畏瘴癘復沿湘而下故有回棹之作其末云舟師煩爾送朱夏及寒泉又登舟將適漢陽云春宅棄汝去秋帆催客歸蓋回棹在夏末此篇已入秋矣繼之以暮秋將歸秦留别湖南幕府親友云北歸衝雨雪誰憫敝貂裘則子美北還之迹見此三篇為詳安得卒於耒陽耶要之卒當在潭嶽之間秋冬之際按元微之子美墓志稱子美之孫嗣業啓子美之柩襄祔事於偃師途次於荆拜余為志辭不能絶其係略曰嚴武狀為工部員外郎參謀軍事旋又棄去扁舟下荆楚竟以寓卒旅殯耒陽丹陽葛常之韻語陽秋曰老杜寄身於兵戈騷屑之中感時對物則悲傷係之如感時花濺淚是也故作詩多用一自字田父泥飲詩云步屧隨春風村村自花栁遣懷詩云愁眼看霜露寒城菊自花憶弟詩云故園花自發春日鳥還飛日暮詩云風月自清夜江山非故園滕王亭子詩云古墻猶竹色虛閣自松聲言人情對景自有悲喜而初不能纍無情之物也臨川王介甫曰老杜云無人覺來往下得覺字大好暝色赴春愁下得赴字大好若下見字起字即小兒言語足見吟詩要一字兩字工夫也丹陽葛常之韻語陽秋曰子美曹將軍丹青引云將軍魏武之子孫於今為庶為清門元微之去杭州詩亦云房杜王魏之子孫雖及百代為清門則知子美於當時已為詩人所欽伏如此殘膏餘馥霑丐後人宜哉故微之云詩人已來未有如子美者也莆陽鄭景韋離經曰李謫仙詩中龍也矯矯焉不受約束杜子美則麟遊靈囿鳯鳴朝陽自是人間瑞物二豪所得殆不可以優劣論也葛常之韻語陽秋曰子美詩以後二句續前二句處甚多如喜弟觀到詩云待爾嗔烏鵲拋書示鶺鴒枝間喜不去原上急曽經晴詩云啼烏爭引子鳴鶴不歸林下食遭泥去髙飛恨久隂江閣卧病詩云滑憶雕菰飯香聞錦帶羮溜匙兼暖腹誰欲致杯罌寄張山人詩云曹植休前輩張芝更後身數篇吟可老一字買堪貧如此之類多矣此格起於謝靈運過廬陵王墓下詩云延州協心許楚老惜蘭芳解劔竟何及撫墳徒自傷李太白亦時有此格毛遂不墮井曽參寧殺人虛言誤公子投杼惑慈親是也丹陽葛常之韻語陽秋曰五言律詩於對聫中十字作一意詩家謂之十字格如老杜放船詩云直愁騎馬滑故作泛舟回對雨詩云不愁巴道路恐濕漢旌旗江月詩云天邊長作客老去一霑巾是也建安嚴有翼藝苑雌黃曰古人用韻如文選古詩杜子美韓退之重復押韻者甚多文選古詩押二捉字曺子建美女篇押二難字謝靈運述祖德詩押二人字南圖詩押二同字初去郡詩押二生字沈休文鍾山應教詩押二足字任彥升哭范僕射詩押三情字兩生字陸士衡赴洛詩押二心字猛虎行押二隂字擬古詩押二音字豫章行押二隂字阮嗣宗詠懷詩押二歸字王正長雜詩押二心字張景陽雜詩押二生字江淹雜體詩押二門字王仲宣從軍詩押二人字杜子美韓退之蓋亦效古人之作子美飲中八仙歌押二船字二眠字二天字三前字園人送瓜詩押二草字上後園山腳押二梁字北征押二日字夔州詠懷押二旋字贈李祕書押二虛字贈李雍押二厲字贈汝陽王押二陵字喜岑薛遷官押二萍字退之贈張籍詩押二更字二狂字二鳴字二光字嶽陽樓别竇司直押二向字李花押二花字雙鳥押二州字二頭字二秋字二休字和盧郎中送盤谷子押二行字示爽押二然字義魚押二銷字寄孟郊押二奧字其餘詩人用韻如此者亦多意到即押爾如子美彭衙行則用數韻艱山顔還攀間關在二十八山字韻聞雲在二十文字韻飱魂門昆在二十三魂字韻餐寒干歡肝在二十五寒字韻椽煙前在一先字韻嗔在十七真字韻此則古詩用韻不拘雖今人亦有之非但唐人用韻如此也按唐韻巳有獨用同用之分非本朝始有韻略獨用通用之限也葛常之韻語陽秋曰子美客夜詩云客睡何曽著秋天不肯明陪王使君泛江詩云山豁何時斷江平不肯流不肯二字含蓄甚佳故杜兩用之與陶淵明詩謂日月不肯遲日時相催迫同意葛常之韻語陽秋曰杜甫李白以詩齊名韓退之詩云李杜文章在光熖萬丈長似未易以優劣也然甫詩思苦而語竒白詩思疾而語豪甫集中言白詩處甚多如曰李白一斗詩百篇如曰清新庾開府俊逸鮑參軍何時一樽酒重與細論文似譏其太俊快白論甫則曰飯顆山頭逢杜甫頭戴笠子日卓午為問因何太瘦生只為從來作詩苦似譏其太愁肝腎也杜牧詩云杜詩韓筆愁來讀似倩麻姑癢處抓天外鳯凰誰得髓何人解合續絃膠則杜甫詩唐朝已來一人而已豈白所能望耶古汳髙元之荼甘録曰杜子美哀貶台州鄭司户虔詩云薈蕞何技癢薈烏外切草多貌蕞在最切又徂外切小也虔自謂著書雖多而皆碎小之事也後人傳寫誤為會粹謂會集其純粹失之逺矣癢以兩切癢也謂人有技藝不能自忍如人之癢也甫謂虔私著國史者不能自忍也爾唐史氏謂虔集當世事著書八十篇目其書為會粹亦承襲之誤矣又示宗武詩云暇日從時飲暇讀為假古雅切屈平離騷聊暇日以偷樂又宋玉九章聊暇日以須時是也葛常之韻語陽秋曰近時論詩皆謂對偶不切則失之簏太切則失之俗如江西詩社所作慮失之俗也老杜江陵詩云地利西通蜀天文北照秦秦州詩云水落魚龍夜山空鳥鼠秋叢篁低地碧髙栁半天青竪子詩云柤梨且綴碧梅杏半傳黃如此之類可謂對偶太切矣又何俗乎如云雜蘂紅相對他時錦不如磨滅餘篇翰平生一釣舟之類雖對不求太切而未嘗失格律也學詩者當審此也馬永卿懶真子録曰古人吟詩絶不草草至於命題各有深意老杜獨酌詩云步屧深林曉開樽獨酌遲仰蜂粘落絮行蟻上枯梨徐步詩云整履步青蕪荒庭日欲晡芹泥隨燕觜花蘂上蜂鬚且獨酌則無獻酬也徐步則非奔走也以故蜂蟻之類微細之物皆能見之也若夫與客對談急趨而過則何暇詳視至於如是哉葛常之韻語陽秋曰水田飛白鷺夏朩囀黃鸝李嘉祐詩也王摩詰衍之為七言曰漠漠水田飛白鷺隂隂夏朩囀黃鸝而興益逺九天閶闔開宫殿萬國衣冠拜冕旒王摩詰詩也杜子美刪之為五言曰閶闔開黃道衣冠拜紫宸而語益工也古汳髙元之荼甘録曰自古工詩者未嘗無興也覩物有感焉則有興今之作詩以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧迷汝來宗生實於此皆興小人盛而掩抑君子也至髙適題處士園則云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者茍知興之與訕異始可與言詩矣葛常之韻語陽秋曰詩人讚美同志詩篇之善多比珠璣璧玉錦繡花草之類至杜子美則豈肯作此陳腐語耶如寄岑參詩云意愜關飛動篇終接混茫夜聽許十誦詩云精微穿溟涬飛動摧霹靂贈盧琚詩云藻翰唯牽率湖上合動搖贈陳諌議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝之與腐菌哉葛常之韻語陽秋曰子美詩善用文選語故宗武亦習之不置所謂熟精文選理休覓綵衣輕又云呼婢取酒壺續兒讀文選是也馬永卿懶真子録曰長安慈恩寺塔有唐進士題名石刻僕讀藏經因謾記之唐玄奘法師貞觀三年八月往五印度取經十九年正月復至京師得如來舍利一百五十粒梵夾六百五十七部始居洪福寺翻譯至二十二年皇太子治為文德皇后於宫城南晉昌里建大慈恩寺寺成令玄奘居之永徽二年師乃於寺造磚浮屠以藏梵本恐火災也所以謂之鴈塔者用西域故事也王舍城之中有僧娑窣堵波僧娑者唐言鴈窣堵波者唐言塔也師至王舍城嘗禮是塔因問其因緣云昔此地有伽藍依小乘食三淨食三淨者謂鴈也犢也鹿也一日衆僧無食仰見羣鴈翔飛輒戲言曰今日衆僧闕供摩訶薩埵宜知之好施謂之薩埵其引前者應聲而墜衆僧飲泣遂依大乘更不食三淨仍建塔以鴈埋其下故師因此名塔其後遂為遊人盛集之地故老杜有同諸公登慈恩寺塔詩葛常之韻語陽秋曰作詩在於鍊字如老杜飛星過水白落月動簷虛是鍊中間一字地拆江帆隱天清朩葉聞是鍊末後一字酬李都督早春詩云紅入桃花嫩青歸栁葉新若非入與歸二字則與兒童之詩何異葛常之韻語陽秋曰七哀詩起於曺子建其次則王仲宣張孟陽也釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而哀謂一事而七者具也子建之七哀在於獨棲而思婦仲宣之哀在於棄子之婦人張孟陽之哀在於已毁之園寢是皆一哀而七者具也老杜之八哀則所哀者八人也王思禮李光弼之武功蘇源明李雍之文翰汝陽鄭虔之多能張九齡嚴武之政事皆不復見矣蓋當時盜賊未息歎舊懷賢而作者也葛常之韻語陽秋曰杜甫纍不第天寶十三載明皇朝獻太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩昭代將垂白途窮乃呌閽氣衝星象表詞感帝王尊天老書題目春官驗討論倚風隨鷁路隨水到龍門是時陳希烈韋見素為宰相而崔國輔于休烈者皆集賢學士也故末句云謬稱三賦在難述二公恩可謂不忘於藻鑑之重者也按唐史是嵗八月見素代陳希烈為宰相而甫集有上見素詩云持衡留藻鑑聽履上星辰則甫之文為見素所賞非希烈也古汳髙元之荼甘録曰子美於天寶十三載獻西嶽賦故集有贈獻納使田舍人詩云舍人退食收封事宫女開函近御筵曉漏追趨青瑣闥晴忩點檢白雲篇末句云揚雄更有河東賦唯待吹噓送上天其云更有河東賦當是獻西嶽賦時也葛常之韻語陽秋曰老杜當干戈騷屑之際間關秦隴負薪拾梠餔糒不給困躓極矣自至蜀依裴冕始有草堂之居觀其經營來往之勞備載於詩皆可考也其曰萬里橋西宅百花潭上莊者言其地也經營上元始斷手寶應年言其時也雲裏江船度風前徑竹斜寒魚依密藻宿鷺起圎沙言其景物也至於草堂塹西無樹林非子誰復見幽深則乞榿朩於何少府之詩也草堂少花今欲栽不問緑李與黃梅則乞果於徐少卿之詩也王侍御携酒草堂則喜而為詩曰故人能領客携酒重相看王録事許草堂資不到則戲而為詩曰為嗔王録事不寄草堂資蓋其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓居閬其心則未嘗一日不在草堂也遣弟檢校草堂則曰鵝鴨宜長數柴荆莫浪開寄題草堂則曰尚念四松小蔓草易拘纒送韋郎歸成都則曰為問南溪竹抽梢會過牆塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度參謀復歸草堂則曰不忍竟捨此復來剃榛蕪入門四松在步屧萬竹疏則其喜可知矣未幾嚴武卒倣徨無依復捨之而去以唐史及公詩考之草堂斷手於寶應之初而永泰元年四月嚴武卒是秋公寓夔州雲安縣有此草堂者終始祇得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂僅閲嵗而巳其起居寢食之興不足以償其經營往來之勞可謂一世之羈人也然自唐至今已數百載而草堂之名與其山川草木皆因公詩以為不朽之傳蓋公之不幸而其山川草木之幸也葛常之韻語陽秋曰張均張垍兄弟承襲父寵致位嚴近皆負文材覬覦端揆明皇欲相均而抑於李林甫欲相垍而奪於楊國忠自此各懷觖望安祿山盜國垍相祿山而均亦受偽命肅宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青瑣亨衢照紫泥靈虬傳夕箭歸馬散霜蹄言均為中書舍人刑部尚書時也贈垍詩云翰林逼華蓋鯨力破滄溟天上張公子宫中漢客星言垍尚寧親公主禁中置宅也二人恩寵烜赫如是則報國當如何而乃斁亂天理下比逆賊反噬其主夫豈人類也哉葛常之韻語陽秋曰北征詩經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌兒顔色白勝雪見爺背面啼垢膩腳不襪方是時甫方脫身於萬死一生之地得見妻兒其情如是洎至秦中則有曬藥能無婦應門亦有兒之句至成都則有老妻憂坐痺幼女問頭風之句觀其情悰已非北征時比也及觀進艇詩則曰晝引老妻乘小艇晴看稚子浴清江江村詩則曰老妻畫紙為棊局稚子敲針作釣鈎其優遊愈悅之情見於嬉戲之間則又異於秦益時矣古汳髙元之荼甘録曰陶淵明命子篇則曰夙興夜寐願爾斯才爾之不才亦已焉哉其責子篇則曰雖有五男兒揔不好紙筆天運茍如此且進杯中物告儼等疏則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人哉則淵明之子未必賢也故杜子美論之曰有子賢與愚何必挂懷抱然子美與諸子亦未為忘情者子美遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶幼子詩云别離驚節換聰慧與誰論憶渠愁祇睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此數詩於諸子鍾情尤甚於淵明矣山谷黃魯直乃云杜子美困於三蜀蓋為不知者詬病以為拙於生事又往往譏宗武失學故寄之淵明爾俗人便為譏病所謂癡人面前不得説夢葛常之韻語陽秋曰月輪當空天下之所共視故謝莊有隔千里兮共明月之句蓋言人雖異處而月則同瞻也老杜當兵戈騷屑之際與其妻各居一方自人情視之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中祇獨看繼之曰香霧雲鬟濕清輝玉臂寒一百五日夜對月詩云無家對寒食有淚如金波繼之曰仳離放紅蘂想象嚬青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家挑錦字燭滅翠眉嚬其數致意於閨門如此其亦謝莊之意乎葛常之韻語陽秋曰老杜省宿詩云明朝有封事數問夜如何蓋愛君欲諌之心切則通夕為之不寐想其犯顔逆耳必不為身謀也葛常之韻語陽秋曰成都記杜主自天而降稱望帝好稼穡治郫城後望帝死其魂化為鳥名曰杜鵑故子美云昔日蜀天子化為杜鵑似老烏又曰古時杜鵑稱望帝魂作杜鵑何微細又曰我見常再拜重是古帝魄博物志稱杜鵑生子寄之他巢百鳥為飼之故子美云生子百鳥巢百鳥不敢嗔乃為餧其子禮若奉至尊又云寄巢生子不自啄羣鳥至今為哺雛子美集中杜鵑詩行凡三篇皆以杜鵑比當時之君而以哺雛之鳥譏當時之臣不能奉其君曽百鳥之不若也最後一篇徒言杜鵑垂血上訴不得其所蓋託興明皇蒙塵之時也故末句云豈思舊日居深宫嬪嬙左右如花紅葛常之韻語陽秋曰古今詩話載子美因見病瘧者曰誦吾詩可療令誦子璋髑髏血糢糊手提擲還崔大夫之句病遂愈余謂子美固嘗病瘧矣其詩云患癘三秋孰可忍又云三年病瘧疾子美於此時何不自誦其詩而自已疾耶是靈於人而不靈於巳夢弼謂誦杜詩能除瘧烏有是理蓋言其詩辭典雅讀之脫然不覺沉痾之去體也葛常之韻語陽秋曰余嘗謂知人雖堯帝猶以為難而杜子美之曽祖姑乃能知唐太宗於側微之時識房杜輩於賤貧之日子美乃形其語於詩曰向竊窺數公經綸亦俱有次問最少年虬髯十八九子等成大名皆因此人手噫亦何異耶葛常之韻語陽秋曰老杜麗人行専言秦虢宴遊之樂末章有當軒下馬入錦茵且莫近前丞相嗔之句當是謂楊國忠也葛常之韻語陽秋曰老杜北征詩云憶昔狼狽初事與古先别不聞夏商衰中自誅褒妲其意謂明皇英斷自誅妃子與夏商之誅褒妲不同老杜此語出於愛君而曲文其過非至公之論也葛常之韻語陽秋曰子美為左拾遺會房琯以陳陶之戰敗罷相甫上疏力救琯肅宗大怒詔三司推問宰相張鎬救之獲免故甫洗兵馬行云張公一生江海客身長九尺鬚眉蒼蓋感其救已也葛常之韻語陽秋曰子美避亂秦蜀衣食不足不免求給於人如贈髙彭州客夜狂夫答裴道州簡韋十凡五篇觀此可見其艱窘而有望於朋友故舊也然當時能賙之者幾何人哉葛常之韻語陽秋曰子美身遭離亂復迫衣食足迹半天下自少時遊吳及越以至作諌官奔走州縣既皆載於壯遊詩矣其後贈韋左丞詩云今欲東入海即將西去秦則自長安之齊魯也贈李白詩云亦有梁宋遊方期拾瑶草則自東都之梁宋也發同谷縣云賢有不黔突聖有不暖席始來兹山中休駕喜地僻奈何迫物纍一嵗四行役則自隴右之劔南也留别章使君云終作適蠻荆安排用莊叟隨雲拜東皇挂席上南斗則自蜀之荆楚也夫士人既無常産為飢所驅豈免仰給於人則奔走道塗亦理之常爾葛常之韻語陽秋曰子美髙自稱許有乃祖之風上書明皇云臣之述作沈鬱頓挫揚雄枚臯可跂及壯遊詩則自比於崔魏班揚又云氣劘屈賈壘目短曺劉牆贈韋左丞則曰賦料揚雄敵詩看子建親甫以詩雄於時自比諸人誠未為過至竊比稷與契則過矣唐史氏稱甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床其忠藎亦可嘉也葛常之韻語陽秋曰山谷黃魯直謂後山陳無巳云學詩如學道此豈尋常雕章繪句者之可擬哉客有謂立方言後山詩其要在於點化杜甫語爾杜云昨夜月同行後山則云勤勤有月與同行杜云林昏罷幽磬後山則云林昏出幽磬杜云古人日巳逺後山則云斯人日巳逺杜云中原鼓角悲後山則云風連鼓角悲杜云暗飛螢自照後山則云飛螢元失照杜云秋覺追隨盡後山則云林湖更覺追隨盡杜云文章千古事後山則云文章平日事杜云乾坤一腐儒後山則云乾坤著腐儒杜云孤城隱霧深後山則云寒城著霧深杜云寒花只暫香後山則云寒花只自香如此類甚多豈非點化老杜之語而成者立方謂不然後山詩格律髙古真所謂碌碌盆盎中見此古罍洗者用語稍同乃是讀少陵詩精熟不覺在其筆下又何足以病公乎諸儒詩話子美戲作俳諧體遣悶云家家養烏鬼頓頓食黃魚養或讀為上聲或讀為去聲沈存中筆談以烏鬼為烏豬謂其俗呼豬作烏鬼之聲也蔡寬夫詩話以烏鬼為巴俗所事神名也冷齋夜話謂巴俗多事烏蠻鬼以臨江故頓頓食黃魚耳緗素雜記以鸕鷀為烏鬼謂養之以捕魚也然詩辭事略又謂楚峽之間事烏為神所謂神鴉也故元微之有詩云病賽烏稱鬼巫占瓦代龜夢弼謂當以事略之言為是也蓋養烏鬼食黃魚自是兩義皆記巴中之風俗也峽中黃魚極大者至數百斤小者亦數十斤按集有詩云日見巴東峽黃魚出浪新脂膏兼飼犬長大不容身是也然是魚豈鸕鷀之所能捕哉彼以烏鬼為鸕鷀其謬尤甚矣或又曰烏鬼謂豬也巴峽人家多事鬼家養一豬非祭鬼不用故於羣豬中特呼烏鬼以别之也今並存之廣陵馬永卿懶真子録曰唐時前輩多自重而後輩亦尊仰前輩而師事之此風最為淳厚杜工部於蘇端薛復筵簡薛華醉歌首云文章有神交有道端復得之名譽早又云坐中薛華善醉歌醉歌自作風格老且一篇之中連呼三人之名想見當時士人一經老杜品題即有聲價故世願得其品題不以呼名為恥也近世士大夫老幼不復篤厚雖前輩詩中亦不敢斥後進之名而後進亦不復尊仰前輩可勝歎哉庾溪詩説士人程文窮日力作一論既不限聲律復不拘詩句尚罕得反復折難使其理判然者觀赴奉先詠懷五百言乃聲律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚竊比稷與契其心術祈嚮自是稷契等人窮年憂黎元歎息腸內熱與飢渴由巳者何異然常為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟灑送日月當今廊廟具建厦豈云缺葵藿傾太陽物性固莫奪言非不知隱遁為髙也亦非以國無其人也特廢義亂倫有所不忍以兹誤生理獨恥事干謁言志大術疏未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲遁既不合時而又不少低屈皆設疑互答屢致意焉非巨刃有餘孰能之乎中間鋪敘間關酸辛宜不勝其戚戚而默思失業徒因念逺戍卒所謂憂在天下而不為一已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之節蚤謀先定出處一致矣是時先後周復正合乎此昔人目元和賀雨詩為諫書余特目此詩為心迹論也䂬溪詩話孟子七篇論君與民者居半其餘欲得君蓋以安民也觀杜陵窮年憂黎民歎息腸內熱胡為將暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄柏學士云幾時髙議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡先生問老杜何如人或言似司馬遷但能名其詩爾愚謂老杜似孟子蓋原其心也古今詩話老杜紅飯啄餘鸚鵡粒碧梧棲老鳯凰枝此語反而意竒退之詩云舞鑑鸞窺沼行天馬渡橋亦效此理杜氏譜系謹按唐書杜甫傳及元稹墓志晉當陽成侯預下十世而生依藝以監察御史令於河南府之鞏縣依藝生審言審言善詩官至修文館學士尚書膳部員外郎審言生間京兆府奉天縣令間生甫左拾遺尚書工部員外郎甫生二子宗文宗武夢弼今以杜氏家譜考之襄陽杜氏出自晉當陽成侯預而佑蓋其後也佑生三子師損式方從郁師損三子詮愈羔式方五子惲憓悰恂慆從郁二子牧顓羣從中悰官最髙而牧名最著杜氏凡五房一京兆杜氏二杜陵杜氏三襄陽杜氏四洹水杜氏五濮陽杜氏而甫一𣲖又不在五派之中甫與佑既同出於預而家譜不載何也豈以其官不逹而諸杜不通譜系乎何家譜之見遺也東孰蔡夢弼因覽其譜系而為之書草堂詩話卷下

body:
  text: 草堂詩話卷上宋蔡夢弼撰名儒嘉話凡二百餘條淮海秦少游進論曰杜子美之於詩實集衆流之長適當其時而巳昔蘇武李陵之詩長於髙妙曹植劉公幹之詩長於豪逸陶潛阮籍之詩長於冲淡謝靈運鮑照之詩長於峻潔徐陵庾信之詩長於藻麗於是子美窮髙妙之格極豪逸之氣包冲淡之趣兼峻潔之姿備藻麗之態而諸家之作所不及焉然不集諸家之長子美亦不能獨至於斯也豈非適當其時故耶孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也孔子之謂集大成嗚呼子美亦集詩之大成歟鳯臺王彥輔詩話曰唐興承陳隋之遺風浮靡相矜莫崇理致開元之間去雕篆黜浮華稍裁以雅正雖飾句繪章人得一槩各爭所長如太羮𤣥酒者薄滋味如孤峯絶岸者駭廊廟穠華可愛者乏風骨爛然可珍者多玷缺逮至子美之詩周情孔思千彚萬狀茹古涵今無有涯涘森嚴昭煥若在武庫見戈㦸布列蕩人耳目非特意語天出尤工於用字故卓然為一代冠而歷世千百膾炙人口豫每讀其文竊苦其難曉如義鶻行巨顙老拳之句劉夢得初亦疑之後覽石勒傳方知其所自出蓋其引物連類掎托前事往往而是韓退之謂光焰萬丈長而世號詩史信哉東坡蘇子瞻詩話曰太史公論詩國風好色而不淫小雅怨誹而不亂以豫觀之是特識變風變雅耳烏覩詩之正乎昔先王之澤衰然後變風發乎情雖衰而未竭是以猶止於禮義以為賢於無所止者而巳若夫發於性止於忠孝其詩豈可同日而語哉古今詩人衆矣而子美獨為首者豈非以其流落饑寒終身不用而一飯未嘗忘君也歟後山陳無巳詩話曰黃魯直言杜子美之詩法出審言句法出庾信但過之耳苕溪胡元任曰老杜亦自言吾祖詩冠古則其詩法乃家學所傳耳詩眼曰古人學問必有師友淵源漢楊惲一書迥出當時流輩則司馬遷外甥故也自杜審言巳自工詩當時沈佺期宋之問等同在儒館為交游故杜甫律詩布置法度全學沈佺期更推廣集大成耳沈有云雲白山青千萬里幾時重謁聖明君甫云雲白山青萬餘里愁看直北是長安沈有云人如天上坐魚似鏡中懸甫云春水船如天上坐老年花似霧中看是皆不免蹈襲前輩然前後傑句亦未易優劣也山谷黃魯直詩話曰船如天上坐人似鏡中行船如天上坐魚似鏡中懸沈雲卿之詩也雲卿得意於此故屢用之老杜春水船如天上坐祖述佺期之語也繼之以老年花似霧中看蓋觸類而長之也苕溪胡元任曰沈雲卿之詩源於王逸少鏡湖詩所謂山隂路上行如在鏡中遊之句然李太白入青溪山詩云人行明鏡中鳥度屏風裏雖有所襲語益工也詩眼曰黃魯直謂文章必謹布置以此槩考古人法度如杜子美贈韋見素詩云紈袴不餓死儒冠多誤身此一篇立意也故使人靜聽而具陳之耳自甫昔少年日至再使風俗淳皆言儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身事也則意舉而文備故巳有是詩矣然必言其所以見韋者於是以厚愧真知之句所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而巳士固不能無望故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏祇是走踆踆又將入海而去秦也然其去也必有遲遲不忍之意故曰尚憐終南山回首清渭濵則所知不可以不别故曰常擬報一飯况懷辭大臣夫如此是可以相忘於江湖之外雖見素亦不得而見矣故曰白鷗波浩蕩萬里誰能馴也此詩布置最得正體如官府甲第㕔堂房室各有定處不可亂也又云詩有一篇命意有句中命意如老杜上韋見素詩布置如此是一篇命意也至其道遲遲不忍去之意則曰尚憐終南山回首清渭濵其道欲與見素别則曰常擬報一飯况懷辭大臣此句中命意也蓋如此然後可以頓挫髙雅矣鳯臺王彥輔麈史曰杜審言子美之祖也唐則天時以詩擅名與宋之問相唱和其詩有綰霧青條弱牽風紫蔓長又有寄語洛城風月道明年春色倍還人之句若子美林花帶雨胭脂落水荇牽風翠帶長又云傳語風光共流轉暫時相賞莫相違雖不襲取其意而語脉蓋有家法矣文昌雜録曰唐嵗時節物元日則有屠蘇酒五辛盤膠牙餳人日則有煎餅上元則有絲籠二月二日則有迎富貴果子三月三日則有鏤人寒食則有假花雞毬鏤雞子干堆蒸餅餳粥四月八日則有糕糜五月五日則有百索糭子夏至則有結杏子七月七日則有金針織女臺乞巧果子八月一日則有㸃炙杖子九月九日則有茱萸菊花酒糕臘日則有口脂面藥澡豆立春則有綵勝雞燕生菜杜甫春日詩春日春盤細生菜又曰勝裏金花巧耐寒重陽詩曰茱茰賜朝士臘日詩曰口脂面藥隨恩澤是皆記當時之所重也金石録曰唐六公詠李雍撰胡履靈書余初讀杜甫八哀詩云朗詠六公篇憂來豁蒙蔽恨不見其詩晚得石本其文辭髙古真一代佳作也六公者五王各為一章狄丞相為一章秦少遊詩話曰曽子固文章妙天下而有韻者輒不工杜子美長於歌詩而無韻者幾不可讀夢弼謂無韻者若課伐朩詩序之類是也遁齊閒覽曰杜子美之詩悲歡窮泰發斂抑揚疾徐縱橫無施不可故其詩有平淡簡易者有綿麗精確者有嚴重威武若三軍之帥者有奮迅馳驟若泛駕之馬者有淡泊閒靜若山谷隱士者有風流醖藉若貴介公子者蓋其詩緒密而思深觀者茍不能臻其閫奧未易識其妙處夫豈淺近者所能窺哉此甫之所以光掩前人而後來無繼也元稹謂兼人之所獨專斯言信矣隱居詩話曰子美潭州詩岸花飛送客檣燕語留人謂喪亂之際人無樂善喜士之心至於一將一迎曽不若岸花檣燕也詩在優柔感諷不在逞豪放而詬怒也子美最善評詩觀其愛李白深矣至稱白則曰李侯有佳句往往似隂鏗又曰清新庾開府俊逸鮑參軍信斯言也觀隂鏗鮑昭詩則知所謂主優柔而下豪放者為不虛矣詩眼曰古人律詩亦是一片文章語或似無倫次而意若貫珠十二月一日詩云今朝臘月春意動雲安縣前江可憐此詩立意念嵗月之遷易感異鄉之飄泊其曰一聲何處送書鴈百丈誰家上水船則羈旅愁思皆在目前未將梅蘂驚愁眼要取椒花媚逺天梅望春而先花椒將夏而乃繁言滯留之勢當自冬過春始終見梅椒則百花之開落皆在其中矣以此益念故國思朝廷故曰明光起草人所羡肺病幾時朝日邊聞官軍收河北詩云劍外忽傳收薊北初聞涕淚滿衣裳夫人感極則悲悲定而後喜忽聞大盜之平喜唐室復見太平顧視妻子知免流離故曰却看妻子愁何在其喜之至也不知手之舞之足之蹈之故曰漫展詩書喜欲狂從此有樂生之心故曰白日放歌須縱酒於是率中原流寓之人同歸以青春和暖之時即路故曰青春作伴好還鄉言其道塗則曰欲從巴峽穿巫峽言其所歸則曰便下襄陽到洛陽此蓋曲盡一時之意愜當衆人之情通暢有條理如辨士之語言然所謂意若貫珠也石林葉夢得詩話曰詩人以一字為工世固知之惟老杜變化開闔出竒無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數千里上下數百年只在有與自兩字間而吞吐山川之氣俯仰古今之懷皆見於言外此工妙至到人力不可及也學林新編曰田舍詩云櫸栁枝枝弱枇杷樹樹香或謂櫸栁者栁之一種其名為櫸栁非雙聲字也枇杷乃雙聲字櫸栁不可以對枇杷某謂此詩顯曰田舍則當在田舍時偶見二物蓋所謂景物如此乃以為對爾如覓松苗子詩云落落出羣非櫸栁青青不朽豈楊梅以櫸栁對楊梅乃正對也然則以櫸栁對枇杷非誤也寄髙詹事云天上多鴻鴈池中足鯉魚鴻鴈二物也鯉者魚之一種其名為鯉疑不可以對鴻鴈然懷李太白云鴻鴈幾時到江湖秋水多以鴻鴈對江湖為正對矣得舍弟消息云浪傳烏鵲喜深負鶺鴒詩烏鵲二物疑不可以對鶺鴒然偶題云音書恨烏鵲號怒怪熊羆以烏鵲對熊羆為正對矣寄李白云幾年遭鵩鳥獨泣向麒麟鵩鳥乃鳥之名鵩者疑不可以對麒麟然寄賈嶽州嚴巴州兩閣老云貔虎間金甲麒麟受玉鞭以貔虎對麒麟為正對矣哭韋晉之云鵩鳥長沙諱犀牛蜀郡憐以鵩鳥對犀牛為正對矣子美豈不知對屬之偏正邪蓋其縱橫出入無不合也後山陳無巳詩話曰杜之詩法韓之文法也詩文各有體韓以文為詩杜以詩為文故不工耳石林葉夢得詩話曰禪宗謂雲門有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所到其三為函蓋乾坤句謂泯然皆契無間可伺其深淺以是為序余嘗戲為學子言老杜詩亦有此三種語但先後不同以波飄菰米沉雲黑露冷蓮房墜粉紅為函蓋乾坤句以落花游絲白日靜鳴鳩乳燕青春深為隨波逐浪句以百年地僻柴門逈五月江深草閣寒為截斷衆流句若有解此當與渠同參山谷黃魯直詩話曰子美作詩退之作文無一字無來處蓋後人讀書少故謂杜韓自作此語耳古人之為文章真能陶冶萬物雖取古人陳言入翰墨如靈丹一粒㸃鐵成金也漫叟詩話曰詩中有拙句不失為竒作若子美云兩箇黃鸝鳴翠栁一行白鷺上青天之句是也苕溪胡元任叢話曰律詩有扇對格第一與第三句對第二與第四句對如少陵台州鄭司户蘇少監詩云得罪台州去時危棄碩儒移官蓬閣後榖貴歿潛夫東坡蘇子瞻和鬱孤臺詩云邂逅陪車馬尋芳謝朓州凄凉望鄉國得句仲宣樓之類是也漫叟詩話曰杜詩有自天題處濕當暑著來清自天當暑乃全語也東坡蘇子瞻詩云公獨未知其趣耳臣今時復一中之可謂青出於藍苕溪胡元任叢話曰子瞻此詩戲徐君猷孟亨之皆不飲酒不止天生此對其全篇用事親切尤可喜詩云孟嘉嗜酒桓溫笑徐邈狂言孟德疑公獨未知其趣耳臣今時復一中之風流自有髙人識通介寧隨薄俗移二子有靈應撫掌吾孫還有獨醒時皆徐孟二人事也吕氏童䝉訓曰陸士衡文賦立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世蓋不能竦動世人如杜子美及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無髙古氣味子美詩云語不驚人死不休所謂驚人語即警䇿也蔡絛西清詩話曰子美洞庭詩云吳楚東南坼乾坤日夜浮不知子美胸中吞幾雲夢也三山老人胡氏語録曰子美慈恩寺塔詩乃譏天寶時事也山者人君之象秦山忽破碎則人君失道矣賢不肖混殽而清濁不分故曰涇渭不可求天下無綱紀文章而上都亦然故曰俯仰但一氣焉能辨皇州於是思古之聖君不可得故曰回首叫虞舜蒼梧雲正愁是時明皇方耽於淫樂而不巳故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黃鵠去不息哀鳴何所投惟小人貪竊祿位者在朝故曰君看隨陽鴈各有稻粱謀石林葉夢得詩話曰詩語固忌用巧太過然緣情體物自有天然工巧而不見其刻削之痕老杜細雨魚兒出微風燕子斜此十字殆無一字虛設細雨著水面為漚魚常上浮而淰若大雨則伏而不出燕體輕弱風猛則不能勝惟微風乃受以為勢故又有輕燕受風斜之句至若穿花蛺蝶深深見㸃水蜻蜓欵欵飛深深字若無穿字欵欵字若無㸃字皆無以見其精微如此然讀之渾然全似未嘗用力此所以不礙其氣格超勝唐末諸子為之便當入魚躍練江拋玉尺鶯穿絲栁織金梭體矣東坡蘇子瞻詩話曰七言之偉麗者如子美云旌旗日暖龍蛇動宫殿風微燕雀髙五更鼓角聲悲壯三峽星河影動搖爾後寂寞無聞焉直至歐陽永叔云滄波萬古流不盡白鳥雙飛意自閒萬馬不嘶聽號令諸番無事著耕耘可以並驅爭先矣詩眼曰世俗喜綺麗知文者能輕之後生好風花老大即厭之然文章論當理不當理耳茍當於理則綺麗風花同入于妙茍不當理則一切皆為長語上自齊梁諸公下至劉夢得輩往往以綺麗風花纍其正性其過在於理不勝而詞有餘也子美云緑垂風折笋紅綻雨肥梅岸花飛送客檣燕語留人亦極綺麗其模寫景物意自親切所以妙絶古今其言舂容閒適則有穿花蛺蝶深深見㸃水蜻蜓欵欵飛落花遊絲白日靜鳴鳩乳燕青春深其言秋景悲壯則有藍水逺從千澗落玉山髙並兩峯寒無邊落朩蕭蕭下不盡長江滚滚來其富貴之詞則有香飄合殿春風轉花覆千官淑景移麒麟不動爐煙轉孔雀徐開扇影還其弔古則有映階碧草自春色隔葉黃鸝空好音竹送清溪月苔移玉座春皆出於風花然窮盡性理移奪造化自古詩人巧即不壯壯即不巧巧而能壯乃如是也矣隱居詩話曰李光弼代郭子儀入其軍號令不更而旌旗改色及其亡也子美哀之云三軍晦光彩烈士痛稠疊前人謂杜甫之為詩史蓋為是也非但序陳迹托故實而巳崔德符曰少陵八哀詩可以表裏雅頌中古作者莫及也兩紀行詩發秦州至鳯凰臺發同谷縣至成都府二十四首皆以經行為先後無復差舛昔韓子蒼嘗論此詩筆力變化當與太史公諸贊方駕學者宜常諷誦之苕溪胡元任叢話曰李杜畫像古今詩人題詠多矣若杜子美其詩髙妙固不待言要當知其平生用心處則半山老人之詩得之矣若李太白其豪氣蓋世千載之下猶可嘆想則東坡居士之贊盡之矣半山老人詩云吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老更斥饑死半九州瘦妻僵前子仆後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂嘗願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之遊東坡居士贊云天人幾何同一漚謫仙非謫乃其遊麾斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道宜少留縻之不可矧肯求西望太白橫峩岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘身平生不識髙將軍手汙吾足乃敢嗔作詩一笑君應聞半山老人王介甫也詩眼曰孫莘老嘗謂老杜北征詩勝韓退之南山詩王平甫以謂南山勝北征終不能相服時山谷黃魯直尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定隱居詩話曰夏鄭公竦評老杜初月詩微升紫塞外巳隱暮雲端以為意主肅宗也鄭公善評詩者也吾觀韓退之煌煌東方星奈此衆客醉其順宗時作也東方謂憲宗在儲也山谷黃魯直詩話曰好作竒語自是文章一病但當以理為主理得而辭順文章自然出羣拔萃觀子美到䕫州後詩韓退之自潮州還朝後文皆不煩繩削而自合矣迂叟詩話曰唐曲江開元天寶中旁有殿宇安史亂後其地盡廢文宗覽杜甫詩云江頭宫殿鎖千門細栁新蒲為誰緑因建紫雲樓彩霞亭嵗時賜宴又詔百司於兩岸建亭館焉苕溪胡元任叢話曰嚴氏溪放歌云劔南嵗月不可度邊頭公卿仍獨驕按唐史杜甫傳嚴武以世舊待甫甚善甫嘗醉登武牀瞪曰嚴挺之乃有此兒武亦暴猛外若不為忤中銜之一日欲殺甫集吏於門武將出冠鉤於簾三左右白其母奔救得止以此知邊頭公卿仍獨驕之句當為此也苕溪胡元任叢話曰子美戲作花卿歌細考此歌想花卿當時在蜀中雖有一時平賊之功然驕恣不法人甚苦之故子美不欲顯言之但云人道我卿絶世無既稱絶世無天子何不喚取守東都語句含蓄蓋可知東原録曰子美送楊六判官使西蕃詩云子雲清自守今日起為官諸本皆然豫謂今當作金蓋金日磾本休屠王太子與母閼氏俱沒入官輸黃門養馬武帝嘗竒之賜湯沐衣冠拜為馬監唐中興時贊普必有相類者故甫用之也或曰子雲對今日但取日以對雲也蜀人師古詩話曰子美江村詩云老妻畫紙為棊局稚子敲針作釣鈎謂妻比臣夫比君棊局直道也針本全直而敲曲之言老臣以直道成帝業而幼君壞其法稚子比幼君也此天厨禁臠之說也或說老妻以比楊貴妃稚子以比安祿山蓋祿山為貴妃養子棊局天下之喻也貴妃欲以天下私祿山故祿山得以邪曲包藏禍心此說似為得之雖然子美之意亦不如此老妻稚子乃甫之妻子甫肯以已妻子而托意於淫婦人與逆臣哉理必不然且如進艇詩云晝引老妻乘小艇晴看稚子浴清江則又將何所比况乎此皆村居與妻子適情以自樂故形之詩詠皆若托意於草朩鳥獸之類不宜區區肆穿鑿也呂氏童䝉訓曰謝無逸語汪信民云老杜有自然不做底語到極至處者有雕琢語到極至處者如丹青不知老將至富貴於我如浮雲此自然不做底語到極至處者也如金鐘大鏞在東序氷壺玉衡懸清秋此雕琢語到極至處者也蜀人師古詩話曰子美遣興詩云笋根稚子無人見沙上鳬雛傍母眠稚子為之說者不一或以為竹䶉或以為雉雛或以為笋皆非也殊不知子美多借為對偶其句語相混後人多不曉其義稚子乃甫之子宗文也甫有二子一曰宗文字稚子二曰宗武字驥子如云驥子春猶隔鶯歌暖正繁乃憶幼子之詩也借驥子以對鶯歌正似此以稚子對鳬雛之類是也甫有詩云老妻畫紙為棊局稚子敲針作釣鈎又云晝引老妻乘小艇晴看稚子浴清江又云鄰人有美酒稚子夜能賖則稚子乃宗文也審矣笋根稚子無人見此尋兒不見忽於竹叢邊得子遂有此句復何疑乎殊不看下句沙上鳬雛傍母眠以禽鳥猶知愛其子可以人反不如之乎蓋謂小兒戲於竹邊偶尋不見遂至感物以興巳意其理灼然也苕溪胡元任叢話曰律詩之作用字平側世固有定體衆共守之然不若時用變體如兵之出竒變化無窮以驚世駭目如老杜詩云竹裏行厨洗玉盤花邊立馬簇金鞍非關使者徴求急自識將軍禮數寬百年地僻柴門迥五月江深草閣寒看弄漁舟移白日老農何有罄交歡此乃七言律詩之變體也又云山瓶乳酒下青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍此乃絶句律詩之變體也又有七言律詩至第三句便失粘落平側亦别是一體唐人用此甚多但今人少用耳如有云搖落深知宋玉悲風流儒雅亦吾師悵望千秋一灑淚蕭條異代不同時江山故宅空文藻雲雨荒臺豈夢思最是楚宫俱泯滅舟人指㸃到今疑又有云謾向江頭把釣竿懶眠沙草愛風湍莫倚善題鸚鵡賦何須不著鵕䴊冠腹中詩籍幽時曝肘後醫方靜處看興發㑹能騎駿馬終須重到使君灘此二詩起頭用側聲故第三句亦用側聲又有云暮春三月巫峽長皛皛行雲浮日光雷聲忽送千山雨花氣渾如百和香黃鸝過水翻回去燕子銜泥濕不妨飛閣卷簾圖畫裏虛無只少對瀟湘此詩起頭用平聲故第三句亦用平聲凡此皆律詩之變體學詩者不可不知也蜀人師古詩話曰子美古柏行霜皮溜雨四十圍黛色參天二千尺說者謂濶四十圍長二千尺何其長與廣不相等耶有以兩指為圍有以合抱為圍若用指為圍則長而太瘦若用抱為圍則又褊而短甫之言果為如何大抵詩人之言不必於長短小大而求其疵也詩取其意不必泥其語孟子謂不以文害辭不以辭害意蓋知詩者也潁濵蘇子由曰老杜陷賊時有哀江頭詩云少陵野老吞聲哭春日潜行曲江曲江頭宫殿鎖千門細栁新蒲為誰緑憶昔霓旌下南苑苑中萬物生顔色昭陽殿裏第一人同輦隨君侍君側輦前才人帶弓箭白馬嚼囓黃金勒翻身向天仰射雲一箭正墜雙飛翼明眸皓齒今何在血汚遊魂歸不得清渭東流劔閣深去住彼此無消息人生有情淚沾臆江水江花豈終極黃昏胡騎塵滿城欲往城南望城北豫愛其詞氣如百金戰馬注坡驀澗如履平地得詩人之遺法也苕溪胡元任叢話曰子美江南逢李龜年詩云岐王宅裏尋常見崔九堂前幾度聞正是江南好風景落花時節又逢君此詩非子美作岐王開元十四年薨崔滌亦卒於開元中是時子美方十五嵗天寶後子美未嘗至江南夢弼謂當考萬竹髙元之端叔荼甘録曰老杜螢火詩幸因腐草出敢近太陽飛未足臨書卷時能㸃客衣似譏當時閹人用事於人君之前不能主張文儒而乃如青蠅之㸃素也說者謂喻小有才而侵侮大德豈不誤哉廣陵馬永卿大年懶真子録曰日臨公館靜畫滿地圖雄劍閣星橋北松州雪嶺東華夷山不斷吳蜀水相通興與煙霞㑹清樽幸不空右杜工部嚴武㕔詠蜀道畫圖是時武跋扈微有割據之意故甫於詩諷之云山不斷水相通以言蜀不可割據也幕下有益於東道者有如此也丹陽葛常之韻語陽秋曰傳云學士大夫則知尊祖矣族之所在祖之所出也其可以不敬乎陶淵明有贈長沙公詩序云長沙公於余為族祖同出大司馬昭穆既逺巳為路人故其詩云同源分流人易世疏慨然晤歎念斯厥初禮服遂悠嵗月眇徂感彼行路眷焉踟蹰蓋深傷之也長沙公於淵明如此而淵明乃以教戒自任其臨别贈言之際有進簣雖少終在為山之句嗚呼淵明亦可謂賢矣杜子美數訪從孫濟而不免於防猜故其詩云所來為宗族亦不為盤飱勿受外嫌猜同姓古所敦觀長沙公與濟尊祖之義掃地矣葛常之韻語陽秋曰賢者豹隱墟落固當和光同塵雖舍者爭席奚病而况於杯酒之間哉陶淵明杜子美皆一世偉人也每田父索飲必使之畢其歡而盡其情而後去淵明詩云清晨聞叩門倒裳往自開問子為誰歟田父有好懷壺漿逺見候疑我與時乖子美詩云田翁逼社日邀我嘗春酒呌婦開大瓶盆中為吾取二公皆有位者也於田父何拒焉至於田父有一世皆尚同願君汩其泥之說則姑守陶之介久客惜人情如何拒鄰叟則何妨杜之通乎捫蝨新話老杜詩當是詩中六經他人詩乃諸子之流也杜詩有髙妙語如云王侯與螻蟻同盡隨丘墟願聞第一義回向心地初可謂深入理窟晉宋以來詩人無此句也心地初乃莊子所謂游心於淡合氣於漠之義也程氏演繁露老杜七歌竹林為我啼清晝蔡絛以竹林為禽名恐穿鑿也竹本非啼詩人因其號風若哀因謂之啼何必有喙者而後能啼耶說文竹之天然似人之笑因為笑字竹豈能笑特以象言爾非笑而可名以笑從懷哀者觀之孰不得為啼耶洪內翰容齊隨筆云古人酬和詩必答其來意非若今人為次韻所局也觀文選所編何劭張華盧諶劉琨二陸三謝諸人贈答可知巳唐人尤多不可具載姑取杜集數篇略紀於此髙適寄杜公云愧爾東西南北人杜則云東西南北更堪論髙又有詩云草𤣥今巳畢此外更何言杜則云草𤣥吾豈敢賦或似相如嚴武寄杜云興發㑹能馳駿馬終須重到使君灘杜則云枉沐旌麾出城府草茅無徑欲教鋤杜公寄嚴詩云何路出巴山重巖細菊班遙知簇鞍馬回首白雲間嚴答云卧向巴山落月時籬外黃花菊對誰跋馬望君非一度冷猿秋鴈不勝悲杜送韋迢云洞庭無過鴈書疏莫相忘迢云相憶無南鴈何時有報章又云雖無南去鴈看取北來魚郭受寄杜云春興不知凡幾首杜答云藥裹關心詩總廢皆如鐘磬在簴扣之則應往來反復於是乎有餘味矣黃常明詩話杜詩有用一字凡數十處不易者如緣江路熟俯青郊傲睨俯峭壁展席俯長流杖藜俯沙渚此邦俯要衝四顧俯層巔旄頭俯澗瀍層臺俯風渚游目俯大江江檻俯鴛鴦其餘一字屢用若此類多不可具述螢雪叢說老杜詩詞酷愛下受字蓋自得之妙不一而足如修竹不受暑輕燕受風斜吹面受和風野航恰受兩三人誠用字之工也然其所以大過人者無他只是平易雖曰似俗其實眼前事爾老妻畫紙為棊局稚子敲針作釣鈎以老對稚以其妻對其子無如此之親切又是閨門之事宜與知者道黃常明詩話數物以個謂食為喫甚近鄙俗獨杜屢用峽口驚猿聞一個兩個黃鸝鳴翠栁却繞井邊添個個送李校書云臨岐意頗切對酒不能喫樓頭喫酒樓下卧但使殘年飽喫飯梅熟許同朱老喫蓋篇中大概竒特可以映帶者也捫蝨新話云韓以文為詩杜以詩為文世傳以為戲然文中要自有詩詩中要自有文亦相生法也文中有詩則句語精確詩中有文則詞調流暢謝𤣥暉曰好詩圓美流轉如彈丸此所謂詩中有文也唐子西曰古文雖不用偶儷而散句之中暗有聲調步驟馳騁亦有節奏此所謂文中有詩也觀子美到夔州以後詩簡易純熟無斧鑿痕信是如彈丸矣黃常明詩話子美云設網萬魚急蓋指聚斂之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撐突波濤挺久入小人舞智趨時巧宦數遷所謂疾若風也殘民以逞不顧傾覆所謂挺義入也日暮蛟龍改窟穴山根鱣鮪隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何為縱此樂暴殄天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不専為取魚也退之叉魚曰觀樂憶吾僚異此意矣黃常明詩話賈生終童欲輕事征伐大抵少年躁鋭使綿歷老成當不如此昔人欲沉孫武於五湖斬白起於長平誠有謂哉嘗愛老杜云慎勿吞青海無勞問越裳大君先息戰歸馬華山陽又有安得壯士挽天河淨洗甲兵長不用安得務農息戰鬬普天無吏橫索錢願戒兵猶火恩加四海深不眠憂戰伐無力正乾坤其愁歎憂戚蓋以人主生靈為念孟子以善言陳戰為大罪我戰必克為民賊仁人之心易地皆然捫蝨新話陶淵明詩采菊東籬下悠然見南山采菊之際無意於山而景與意㑹此淵明得意處也而老杜亦曰夜䦨接軟語落月如金盆豫愛其意度間雅不減淵明而語句雄健過之每詠此二詩便覺當時清景盡在目前而二公寫之筆端殆若天成兹為可貴古今詞話蜀人將進酒嘗以為少陵詩作瑞鷓鴣唱之昔時曽從漢梁王濯錦江邊醉幾場拂石坐來衫䄂冷踏花歸去馬蹄香當初酒賤寧辭醉今日愁來不易當暗想舊遊渾似夢芙蓉城下水茫茫此詩或謂杜甫或謂鬼仙或謂曲詞未知孰是然詳味其言唐人語也首先有曽從漢梁王之句决非子美作也况集中不載灼可見矣不知楊曼倩何所據云草堂詩話卷上
